spring:
  application:
    name: pingpong-club

  datasource:
    url: jdbc:postgresql://localhost:5432/pingpong_club
    username: pingpong
    password: pingpong_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway zarządza schematem — Hibernate tylko waliduje
    open-in-view: false         # wyłącza WARN o lazy loading podczas renderowania widoku
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        # dialect usunięty – Hibernate 6 wykrywa PostgreSQL automatycznie

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

app:
  jwt:
    # ZMIEŃ ten sekret przed deploymentem na produkcję!
    # Wygeneruj: openssl rand -base64 64
    secret: "dGhpcyBpcyBhIHZlcnkgbG9uZyBkZXZlbG9wbWVudCBzZWNyZXQga2V5IGZvciBwaW5ncG9uZyBjbHViIDIwMjQ="
    expiration-ms: 86400000   # 24h

logging:
  level:
    pl.pingpong.club: DEBUG
    org.springframework.security: INFO
