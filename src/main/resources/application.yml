spring:
  application:
    name: pingpong-club

  config:
    import: optional:classpath:application-local.yml

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pingpong_club}
    username: ${DB_USERNAME:pingpong}
    password: ${DB_PASSWORD:pingpong_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

ai:
  base-url: ${AI_BASE_URL:https://api.groq.com/openai/v1}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:llama-3.3-70b-versatile}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBkZXZlbG9wbWVudCBzZWNyZXQga2V5IGZvciBwaW5ncG9uZyBjbHViIDIwMjQ=}
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    pl.pingpong.club: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
