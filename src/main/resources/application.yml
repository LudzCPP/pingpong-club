spring:
  application:
    name: pingpong-club

  datasource:
    url: jdbc:postgresql://localhost:5432/pingpong_club
    username: pingpong
    password: pingpong_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway zarządza schematem — Hibernate tylko waliduje
    open-in-view: false         # wyłącza WARN o lazy loading podczas renderowania widoku
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        # dialect usunięty – Hibernate 6 wykrywa PostgreSQL automatycznie

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

ai:
  # Provider zgodny z OpenAI Chat API. Zmień base-url + model żeby użyć innego.
  # Groq (darmowy, ~14 000 req/dzień): https://console.groq.com → utwórz klucz API
  base-url: https://api.groq.com/openai/v1
  api-key: ${AI_API_KEY:}
  model: llama-3.3-70b-versatile
  # OpenAI:  base-url: https://api.openai.com/v1   model: gpt-4o-mini
  # Ollama:  base-url: http://localhost:11434/v1    model: llama3.2   api-key: ollama

app:
  jwt:
    # ZMIEŃ ten sekret przed deploymentem na produkcję!
    # Wygeneruj: openssl rand -base64 64
    secret: "dGhpcyBpcyBhIHZlcnkgbG9uZyBkZXZlbG9wbWVudCBzZWNyZXQga2V5IGZvciBwaW5ncG9uZyBjbHViIDIwMjQ="
    expiration-ms: 86400000   # 24h

logging:
  level:
    pl.pingpong.club: DEBUG
    org.springframework.security: INFO
