spring:
  application:
    name: pingpong-club

  datasource:
    url: jdbc:postgresql://localhost:5432/pingpong_club
    username: pingpong
    password: pingpong_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway zarządza schematem — Hibernate tylko waliduje
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    pl.pingpong.club: DEBUG
    org.springframework.security: INFO
