app = "ttmanager-backend"
primary_region = "waw"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.health_checks]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/api/actuator/health"
    timeout = "10s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
