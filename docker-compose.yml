version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pingpong_db
    environment:
      POSTGRES_DB: pingpong_club
      POSTGRES_USER: pingpong
      POSTGRES_PASSWORD: pingpong_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pingpong -d pingpong_club"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pingpong_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pingpong.pl
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
